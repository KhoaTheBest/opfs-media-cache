<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Storage Manager Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
      .progress-bar {
        width: 100%;
        height: 20px;
        background: #eee;
        border-radius: 10px;
        overflow: hidden;
        margin: 10px 0;
      }

      .progress-fill {
        height: 100%;
        background: #4caf50;
        width: 0%;
        transition: width 0.3s ease;
      }

      .notification {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 15px;
        background: #4caf50;
        color: white;
        border-radius: 5px;
        display: none;
        animation: slideIn 0.3s ease;
      }

      .file-drop-zone {
        width: 100%;
        height: 150px;
        border: 2px dashed #ccc;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 10px 0;
      }

      .file-drop-zone:hover:not(.disabled) {
        border-color: #4CAF50;
        background-color: rgba(76, 175, 80, 0.05);
      }

      .file-drop-zone.drag-active {
        border-color: #4CAF50;
        background-color: rgba(76, 175, 80, 0.1);
      }

      .file-drop-zone.disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
      }

      .drop-zone-text {
        text-align: center;
        color: #666;
      }

      .drop-zone-subtext {
        font-size: 0.9em;
        color: #999;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(0);
        }
      }

      #downloadQueue {
        list-style: none;
        padding: 0;
        margin: 10px 0;
      }

      #downloadQueue li {
        margin: 5px 0;
        padding: 10px;
        background: #f5f5f5;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel full-width">
        <h2>Storage Manager Test Interface</h2>
        <button id="initStorage">Initialize Storage</button>
        <button id="clearCache">Clear Cache</button>
        <span id="storageInfo"></span>
      </div>

      <div class="panel">
        <h3>Test Assets</h3>
        <button id="addImage">Add Sample Image</button>
        <button id="addSameImage">Add Same Image Again</button>
        <button id="addMultiple">Add Multiple</button>

        <div class="panel">
          <h3>Local File Upload</h3>
          <input type="file" id="fileInput">
          <div id="fileDropZone" class="file-drop-zone disabled">
            <div class="drop-zone-text">
              Drag & drop files here<br>
              <span class="drop-zone-subtext">or click to select files</span>
            </div>
          </div>
        </div>

        <div id="downloadQueue"></div>
        <div id="preview"></div>
      </div>

      <div class="panel">
        <h3>Cache Statistics</h3>
        <canvas id="storageChart"></canvas>
      </div>

      <div class="panel full-width">
        <h3>Cached Assets</h3>
        <ul id="assetList" class="asset-list"></ul>
      </div>
    </div>

    <div id="notification" class="notification"></div>

    <script type="module" src="./demo.ts"></script>
  </body>
</html>
